<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Atlas Coup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0e1219 0%, #080b12 100%);
      font-family: 'Quicksand', sans-serif;
      color: #fff;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .icon-wrap {
      width: 96px;
      height: 96px;
      margin: 0 auto 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-primary {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #4facfe, #2563eb);
      color: #fff;
      font-family: 'Quicksand', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { opacity: 0.8; }
    .btn-ghost {
      padding: 14px 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: transparent;
      color: rgba(255, 255, 255, 0.6);
      font-family: 'Quicksand', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
    }
    .btn-ghost:active {
      background: rgba(255, 255, 255, 0.04);
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }
    .logo span { color: #4facfe; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Atlas <span>Coup</span></div>
    <div class="icon-wrap">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <line x1="2" y1="2" x2="22" y2="22" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
      </svg>
    </div>
    <h1>No Internet Connection</h1>
    <p>You're offline. Check your connection and try again.</p>
    <div class="actions">
      <button class="btn-primary" onclick="window.location.reload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:8px">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Try Again
      </button>
      <button class="btn-ghost" onclick="window.close()">Close App</button>
    </div>
  </div>
</body>
</html>
