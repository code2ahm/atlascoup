    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: linear-gradient(180deg, #0e1219 0%, #080b12 100%);
        font-family: 'Quicksand', sans-serif;
        transition: opacity 0.4s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash-logo { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: -0.3px; margin-bottom: 28px; }
      #splash-logo span { color: #4facfe; }
      #splash-spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.08); border-top-color: #4facfe; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
